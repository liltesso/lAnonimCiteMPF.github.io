                <button class="map-zoom-btn" id="map-zoom-out" aria-label="Зменшити">−</button>

            <div class="stat-card skeleton-stat"></div>

            </div>
            <div class="threats-list" id="alerts-threats-list">
                <div class="threat-skeleton"></div>
                <div class="threat-skeleton"></div>
            </div>
        </div>

            </div>
            <div class="attacks-list" id="alerts-attacks-list">
                <div class="attack-skeleton"></div>
                <div class="attack-skeleton"></div>
            </div>
        </div>

</section>
